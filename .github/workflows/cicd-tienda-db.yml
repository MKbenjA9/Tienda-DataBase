name: CI/CD Tienda Perritos - Database

on:
  push:
    branches: [ "main" ]
    paths:
      - "db/**"
      - ".github/workflows/**"

jobs:
  build-push-deploy-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagen Database
        run: |
          cd db
          docker build -t tienda-db .

      - name: Tag imagen Database
        run: |
          docker tag tienda-db:latest ${{ secrets.ECR_REPO_URL_DATA }}:latest

      - name: Push imagen Database a ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URL_DATA }}:latest

      - name: Desplegar Database vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_DATA_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin '${{ secrets.ECR_REGISTRY }}'",
              "docker pull '${{ secrets.ECR_REPO_URL_DATA }}':latest",
              "docker stop tienda-db || true",
              "docker rm tienda-db || true",
              "docker run -d --name tienda-db -p 3306:3306 -v dbdata:/var/lib/mysql '${{ secrets.ECR_REPO_URL_DATA }}':latest"
            ]}' \
            --region ${{ secrets.AWS_REGION }} \
            --output text